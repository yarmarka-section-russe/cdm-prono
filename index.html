<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PRONOS 26 — Coupe du Monde 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080C12;
  --bg2:#0F1620;
  --bg3:#162030;
  --pitch:#0C3326;
  --pitch2:#08251C;
  --gold:#E8B33D;
  --goldf:rgba(232,179,61,0.15);
  --red:#FF4F56;
  --redf:rgba(255,79,86,0.12);
  --green:#3DDC84;
  --greenf:rgba(61,220,132,0.12);
  --blue:#4F9EFF;
  --dim:#6B7A8D;
  --text:#EEE9DF;
  --r:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{cursor:pointer;border:none;font-family:inherit;line-height:1;}
input,select{font-family:inherit;}
.hidden{display:none!important;}
*:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

/* ====== BACKGROUND ====== */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% -5%,rgba(12,51,38,.7),transparent),
    radial-gradient(ellipse 50% 30% at 90% 5%,rgba(232,179,61,.07),transparent),
    radial-gradient(ellipse 80% 50% at 50% 100%,rgba(12,51,38,.3),transparent);
}
#root{position:relative;z-index:1;}

/* ====== TOAST ====== */
#toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:90%;max-width:360px;}
.toast{background:var(--bg3);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transform:translateY(-8px) scale(.97);transition:all .22s;box-shadow:0 12px 30px -8px #000;text-align:center;}
.toast.show{opacity:1;transform:translateY(0) scale(1);}
.toast.ok{border-color:rgba(61,220,132,.35);color:var(--green);}
.toast.err{border-color:rgba(255,79,86,.35);color:var(--red);}

/* ====== AUTH ====== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{width:100%;max-width:360px;background:var(--bg2);border:1px solid rgba(232,179,61,.18);border-radius:22px;padding:30px 24px;box-shadow:0 40px 80px -20px rgba(0,0,0,.7);}
.auth-logo{text-align:center;margin-bottom:22px;}
.auth-logo .ball{font-size:36px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(232,179,61,.4));}
.auth-logo h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;letter-spacing:1px;text-transform:uppercase;}
.auth-logo .g{color:var(--gold);}
.auth-logo p{color:var(--dim);font-size:12px;margin-top:4px;}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:16px;}
.atab{flex:1;padding:9px;background:transparent;color:var(--dim);border-radius:8px;font-size:13px;font-weight:600;transition:.2s;}
.atab.on{background:var(--pitch);color:var(--text);}
.aform{display:flex;flex-direction:column;gap:10px;}
.aform input{background:var(--bg);border:1.5px solid rgba(255,255,255,.07);color:var(--text);padding:13px 14px;border-radius:10px;font-size:14px;transition:border-color .2s;}
.aform input:focus{border-color:rgba(232,179,61,.4);outline:none;}
.aform input::placeholder{color:var(--dim);}
.btn-gold{background:linear-gradient(135deg,#E8B33D,#C8932A);color:#180F00;font-weight:700;padding:13px;border-radius:10px;font-size:14px;letter-spacing:.3px;transition:transform .15s,box-shadow .15s;width:100%;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 24px -6px rgba(232,179,61,.45);}
.btn-gold:active{transform:scale(.98);}

/* ====== APP SHELL ====== */
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;position:sticky;top:0;z-index:50;background:rgba(8,12,18,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.05);}
.hdr-brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;letter-spacing:.5px;}
.hdr-brand .g{color:var(--gold);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.pts-pill{background:var(--goldf);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:20px;}
.pseudo-tag{font-size:12px;font-weight:600;color:var(--dim);}
.btn-out{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--dim);padding:6px 12px;border-radius:8px;font-size:11.5px;font-weight:600;}

/* ====== BOTTOM NAV ====== */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:50;display:flex;background:rgba(8,12,18,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.07);padding-bottom:var(--safe-bottom);}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px;background:transparent;color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.2px;position:relative;transition:.2s;}
.navbtn.on{color:var(--text);}
.navbtn .icon{font-size:20px;line-height:1;}
.navbtn .dot{position:absolute;top:8px;right:calc(50% - 12px);background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:20px;padding:1px 5px;line-height:1.4;}
.navbtn.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:32px;height:2.5px;background:var(--gold);border-radius:3px 3px 0 0;}

.content{flex:1;overflow-y:auto;padding:14px 14px 100px;-webkit-overflow-scrolling:touch;}
.pane{display:none;animation:fi .22s ease;}
.pane.on{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ====== GENERIC COMPONENTS ====== */
.strip{background:var(--bg2);border:1px solid rgba(232,179,61,.13);border-radius:12px;padding:10px 14px;font-size:12px;color:var(--dim);margin-bottom:14px;line-height:1.6;}
.strip strong{color:var(--gold);}
.strip.red{border-color:rgba(255,79,86,.2);background:rgba(255,79,86,.05);}
.strip.red strong{color:var(--red);}
.slabel{font-family:'Oswald',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin:16px 0 9px;}
.loading,.empty{text-align:center;color:var(--dim);padding:28px 10px;font-size:13px;font-style:italic;}
.seg{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:14px;}
.seg-btn{flex:1;padding:9px 4px;background:transparent;color:var(--dim);font-size:12.5px;font-weight:600;border-radius:8px;transition:.2s;}
.seg-btn.on{background:var(--pitch);color:var(--text);}

/* ====== MATCH CARDS ====== */
.mlist{display:flex;flex-direction:column;gap:12px;}
.mcard{background:linear-gradient(155deg,var(--pitch),var(--pitch2));border-radius:var(--r);border:1px solid rgba(232,179,61,.15);overflow:hidden;transition:transform .2s,box-shadow .2s;}
.mcard:active{transform:scale(.99);}
.mcard.missed{border-color:rgba(255,79,86,.35);background:linear-gradient(155deg,rgba(255,79,86,.07),rgba(255,79,86,.03));}
.mcard.exact{border-color:rgba(61,220,132,.35);}
.mcard.partial{border-color:rgba(79,158,255,.25);}

.mcard-top{display:flex;align-items:center;justify-content:space-between;padding:10px 13px 0;}
.gtag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;}
.stag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.s-upcoming{background:rgba(232,179,61,.13);color:var(--gold);}
.s-locked{background:rgba(255,79,86,.13);color:var(--red);}
.s-done{background:rgba(61,220,132,.13);color:var(--green);}

.mteams{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;}
.team{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;min-width:0;}
.team .flag{font-size:32px;line-height:1;}
.team .tname{font-family:'Oswald',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.3px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.vs{font-family:'Oswald',sans-serif;font-size:11px;color:var(--dim);padding:0 8px;}

/* ====== STEPPER (remplace input number) ====== */
.mbot{padding:12px 14px 14px;}
.stepper-row{display:flex;align-items:center;justify-content:center;gap:10px;}
.stepper{display:flex;align-items:center;background:rgba(0,0,0,.4);border:1px solid rgba(232,179,61,.25);border-radius:10px;overflow:hidden;}
.step-btn{background:rgba(232,179,61,.1);color:var(--gold);font-size:20px;font-weight:700;width:38px;height:48px;display:flex;align-items:center;justify-content:center;transition:.15s;user-select:none;}
.step-btn:active{background:rgba(232,179,61,.25);}
.step-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--gold);width:40px;text-align:center;}
.step-sep{font-family:'Oswald',sans-serif;font-size:16px;color:var(--dim);}
.btn-bet{background:var(--gold);color:#180F00;font-weight:700;font-size:12.5px;padding:0 16px;height:48px;border-radius:10px;flex-shrink:0;}
.btn-bet:active{filter:brightness(.9);}

.final-score{text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:28px;letter-spacing:3px;}
.bet-result{text-align:center;font-size:12px;color:var(--dim);margin-top:5px;}
.bet-result .pts-exact{color:var(--green);font-weight:700;}
.bet-result .pts-partial{color:var(--blue);font-weight:700;}
.bet-result .pts-miss{color:var(--red);font-weight:700;}
.locked-info{text-align:center;font-size:12.5px;color:var(--dim);padding:4px 0;}

/* ====== RANKING ====== */
.rlist{display:flex;flex-direction:column;gap:8px;}
.rrow{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:12px;border:1px solid rgba(255,255,255,.04);}
.rrow.me{border-color:rgba(232,179,61,.3);background:rgba(232,179,61,.05);}
.rnum{font-family:'Oswald',sans-serif;font-size:18px;width:28px;text-align:center;color:var(--dim);}
.rnum.g1{color:#FFD75E;}
.rnum.g2{color:#D6DCE5;}
.rnum.g3{color:#D08A4C;}
.rinfo{flex:1;min-width:0;}
.rpseudo{font-size:13.5px;font-weight:600;}
.rlabels{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.lbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.rpts{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);font-weight:700;}

/* ====== FRIENDS ====== */
.fsearch{display:flex;gap:8px;margin-bottom:12px;}
.fsearch input{flex:1;background:var(--bg2);border:1.5px solid rgba(255,255,255,.07);color:var(--text);padding:12px 13px;border-radius:10px;font-size:13px;}
.frow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg2);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:13px;font-weight:600;}
.factions{display:flex;gap:6px;}
.sbtn{background:var(--bg3);color:var(--text);font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:8px;}
.sbtn.ok{background:var(--greenf);color:var(--green);}
.sbtn.ko{background:var(--redf);color:var(--red);}
.stag-small{font-size:11px;color:var(--dim);font-weight:600;}

/* ====== ADMIN ====== */
.aform-grid{display:flex;flex-direction:column;gap:9px;background:var(--bg2);padding:14px;border-radius:12px;margin-bottom:6px;}
.aform-grid input,.aform-grid select{background:var(--bg);border:1.5px solid rgba(255,255,255,.07);color:var(--text);padding:11px 12px;border-radius:8px;font-size:13px;}
.amrow{background:var(--bg2);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.aminfo{font-size:12.5px;font-weight:600;}
.amscore{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.amscore input{background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--gold);padding:7px 5px;border-radius:6px;text-align:center;font-family:'JetBrains Mono',monospace;width:40px;}
.sbtn-small{background:var(--bg3);color:var(--text);font-size:11px;font-weight:700;padding:7px 10px;border-radius:7px;}
.sbtn-small.danger{background:var(--redf);color:var(--red);}

/* ====== LABELS ====== */
.label-creator{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.label-creator input{flex:1;min-width:80px;background:var(--bg);border:1.5px solid rgba(255,255,255,.07);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;}
.label-creator input[type=color]{width:44px;padding:6px;cursor:pointer;border-radius:8px;}
.lrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg2);border-radius:10px;padding:10px 13px;margin-bottom:7px;}
.lrow-info{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;}
.lrow-actions{display:flex;gap:6px;}

/* ====== SYNC BTN ====== */
.sync-row{display:flex;gap:8px;margin-bottom:14px;}
.sync-row button{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;}
.btn-import{background:linear-gradient(135deg,#E8B33D,#C8932A);color:#180F00;}
.btn-sync{background:var(--bg2);border:1px solid rgba(61,220,132,.25);color:var(--green);}
</style>
</head>
<body>
<div id="root">
<div id="toasts"></div>

<!-- AUTH -->
<div id="auth" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="ball">⚽</span>
      <h1>PRONOS<span class="g">26</span></h1>
      <p>Pronostics · Coupe du Monde 2026</p>
    </div>
    <div class="auth-tabs">
      <button class="atab on" data-auth="login">Connexion</button>
      <button class="atab" data-auth="register">Inscription</button>
    </div>
    <form id="loginForm" class="aform">
      <input type="text" id="loginPseudo" placeholder="Pseudo" autocomplete="username" required>
      <input type="password" id="loginPwd" placeholder="Mot de passe" autocomplete="current-password" required>
      <button type="submit" class="btn-gold">Se connecter</button>
    </form>
    <form id="regForm" class="aform hidden">
      <input type="text" id="regPseudo" placeholder="Choisis un pseudo" autocomplete="username" required>
      <input type="password" id="regPwd" placeholder="Mot de passe (4 car. min)" autocomplete="new-password" required>
      <button type="submit" class="btn-gold">Créer mon compte</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="hdr">
    <div class="hdr-brand">PRONOS<span class="g">26</span></div>
    <div class="hdr-right">
      <span id="hdrPts" class="pts-pill">0 pts</span>
      <span id="hdrPseudo" class="pseudo-tag"></span>
      <button id="logoutBtn" class="btn-out">Quitter</button>
    </div>
  </header>

  <div class="content">
    <!-- MATCHS -->
    <div id="pane-matches" class="pane on">
      <div class="strip">Parie avant le coup d'envoi · <strong>+3 pts</strong> score exact · <strong>+1 pt</strong> bonne tendance</div>
      <div id="matchList" class="mlist"></div>
    </div>

    <!-- CLASSEMENT -->
    <div id="pane-rank" class="pane">
      <div class="seg">
        <button class="seg-btn on" data-rank="global">🌍 Général</button>
        <button class="seg-btn" data-rank="friends">👥 Amis</button>
      </div>
      <div id="rankList" class="rlist"></div>
    </div>

    <!-- AMIS -->
    <div id="pane-friends" class="pane">
      <div class="fsearch">
        <input type="text" id="fSearchInput" placeholder="Chercher un pseudo...">
        <button id="fSearchBtn" class="btn-gold" style="width:auto;padding:0 16px;">Chercher</button>
      </div>
      <div id="fSearchResults"></div>
      <div id="fRequests"></div>
      <div class="slabel">Mes amis</div>
      <div id="fList"></div>
    </div>

    <!-- ADMIN -->
    <div id="pane-admin" class="pane">
      <div class="slabel" style="margin-top:0">Matchs officiels</div>
      <div class="sync-row">
        <button id="importBtn" class="btn-import">📅 Importer calendrier</button>
        <button id="syncBtn" class="btn-sync">🔄 Sync scores</button>
      </div>

      <div class="slabel">Ajouter manuellement</div>
      <form id="addMatchForm" class="aform-grid">
        <input list="clist" id="mTeam1" placeholder="Équipe 1" required>
        <input list="clist" id="mTeam2" placeholder="Équipe 2" required>
        <datalist id="clist"></datalist>
        <select id="mGroup"></select>
        <input type="datetime-local" id="mDate" required>
        <button type="submit" class="btn-gold">Ajouter</button>
      </form>

      <div class="slabel">Résultats à saisir</div>
      <div id="adminList"></div>

      <div class="slabel">🏷️ Étiquettes</div>
      <div class="label-creator">
        <input type="text" id="lblEmoji" placeholder="🏆" maxlength="2" style="width:52px;text-align:center;">
        <input type="text" id="lblName" placeholder="Nom de l'étiquette" style="flex:1;">
        <input type="color" id="lblColor" value="#E8B33D">
        <button id="lblCreateBtn" class="btn-gold" style="width:auto;padding:0 16px;">Créer</button>
      </div>
      <div id="lblList"></div>

      <div class="slabel">Assigner une étiquette</div>
      <div class="aform-grid">
        <select id="assignUser"></select>
        <select id="assignLabel"></select>
        <button id="assignBtn" class="btn-gold">Assigner</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="navbtn on" data-tab="matches"><span class="icon">⚽</span>Matchs</button>
    <button class="navbtn" data-tab="rank"><span class="icon">🏆</span>Classement</button>
    <button class="navbtn" data-tab="friends"><span class="icon">👥</span>Amis<span id="fBadge" class="dot hidden">0</span></button>
    <button class="navbtn hidden" id="adminNav" data-tab="admin"><span class="icon">🛠</span>Admin</button>
  </nav>
</div>
</div>

function H(extra={}){

async function sbGet(p){ const r=await fetch(SB_URL+"/rest/v1/"+p,{headers:H()}); if(!r.ok)throw new Error(await r.text()); return r.json(); }
async function sbPost(p,body,extra={}){ const r=await fetch(SB_URL+"/rest/v1/"+p,{method:"POST",headers:H({"Prefer":"return=representation",...extra}),body:JSON.stringify(body)}); if(!r.ok)throw new Error(await r.text()); return r.json(); }
async function sbPatch(p,body){ const r=await fetch(SB_URL+"/rest/v1/"+p,{method:"PATCH",headers:H({"Prefer":"return=representation"}),body:JSON.stringify(body)}); if(!r.ok)throw new Error(await r.text()); return r.json(); }

async function sbRpc(fn,body={}){ const r=await fetch(SB_URL+"/rest/v1/rpc/"+fn,{method:"POST",headers:H(),body:JSON.stringify(body)}); if(!r.ok)throw new Error(await r.text()); return r.json(); }

/* ================================================
   HEURE SERVEUR — anti-manipulation d'horloge
   ================================================ */
let _offset = 0; // décalage client - serveur en ms
async function calibrateTime(){
  try {
    const t0 = Date.now();
    const r = await fetch(SB_URL+"/rest/v1/matches?select=id&limit=1",{headers:H()});
    const t1 = Date.now();
    const srvDate = r.headers.get("Date");
    if(srvDate){ _offset = new Date(srvDate).getTime() - Math.round((t0+t1)/2); }
  } catch(e){ _offset = 0; }
}
function now(){ return Date.now() + _offset; } // heure serveur fiable

/* ================================================
   UTILITAIRES
   ================================================ */
async function sha256(s){
  const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");
}
function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleString("fr-FR",{weekday:"short",day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}).replace(","," ·");
}

async function loadMatches(){
  const box=document.getElementById("matchList");
  box.innerHTML='<p class="loading">Chargement...</p>';
  try {
    const matches=await sbGet("matches?select=*&order=match_date.asc");
    const bets=await sbGet("bets?user_id=eq."+me.id+"&select=*");
    const betMap={}; bets.forEach(b=>betMap[b.match_id]=b);
    if(!matches.length){box.innerHTML='<p class="empty">Aucun match programmé.</p>';return;}
    box.innerHTML="";
    matches.forEach(m=>{
      if(betMap[m.id]){
        setS(m.id,"s1",betMap[m.id].bet_score1??0);
        setS(m.id,"s2",betMap[m.id].bet_score2??0);
      }
      box.appendChild(renderCard(m,betMap[m.id]));
    });
  } catch(e){box.innerHTML='<p class="empty">Erreur de chargement.</p>';console.error(e);}
}

function renderCard(m,myBet){
  const card=document.createElement("div");
  const mTime=new Date(m.match_date).getTime();
  const serverNow=now(); // heure serveur, pas locale
  const locked=serverNow>=mTime; // ← utilise l'heure serveur
  const done=m.status==="finished";

  // Classe de résultat
  let cls="mcard";
  if(done&&myBet){
    if(myBet.points===3) cls+=" exact";
    else if(myBet.points===1) cls+=" partial";
    else if(myBet.points===0) cls+=" missed";
  }

  const f1=m.flag1||flag(m.team1), f2=m.flag2||flag(m.team2);
  const gLabel=m.group_name?.length===1?"GROUPE "+m.group_name:(m.group_name||"?").toUpperCase();

  let stag,bot;
  if(done){
    stag='<span class="stag s-done">TERMINÉ</span>';
    let resHtml='<p class="bet-result">';
    if(myBet){
      const cls2=myBet.points===3?"pts-exact":myBet.points===1?"pts-partial":"pts-miss";
      resHtml+=`Ton prono : ${myBet.bet_score1} - ${myBet.bet_score2} → <span class="${cls2}">+${myBet.points||0} pt${myBet.points>1?"s":""}</span>`;
    } else resHtml+="Pas de pronostic pour ce match.";
    resHtml+='</p>';
    bot=`<div class="final-score">${m.score1} - ${m.score2}</div>${resHtml}`;
  } else if(locked){
    stag='<span class="stag s-locked">VERROUILLÉ</span>';
    bot=`<p class="locked-info">${myBet?`Ton prono : ${myBet.bet_score1} - ${myBet.bet_score2}`:"Pas de pronostic — trop tard."}</p>`;
  } else {
    stag=`<span class="stag s-upcoming">${fmtDate(m.match_date)}</span>`;
    bot=`
      <div class="stepper-row">
        <div class="stepper">
          <button class="step-btn" data-mid="${m.id}" data-key="s1" data-dir="-1">−</button>
          <span class="step-val" id="sv1-${m.id}">${getS(m.id,"s1")}</span>
          <button class="step-btn" data-mid="${m.id}" data-key="s1" data-dir="1">+</button>
        </div>
        <span class="step-sep">–</span>
        <div class="stepper">
          <button class="step-btn" data-mid="${m.id}" data-key="s2" data-dir="-1">−</button>
          <span class="step-val" id="sv2-${m.id}">${getS(m.id,"s2")}</span>
          <button class="step-btn" data-mid="${m.id}" data-key="s2" data-dir="1">+</button>
        </div>
        <button class="btn-bet" data-betid="${m.id}">${myBet?"Modifier":"Parier"}</button>
      </div>`;
  }

  card.className=cls;
  card.innerHTML=`
    <div class="mcard-top"><span class="gtag">${gLabel}</span>${stag}</div>
    <div class="mteams">
      <div class="team"><span class="flag">${f1}</span><span class="tname">${esc(m.team1)}</span></div>
      <div class="vs">VS</div>
      <div class="team"><span class="flag">${f2}</span><span class="tname">${esc(m.team2)}</span></div>
    </div>
    <div class="mbot">${bot}</div>`;

  // Steppers
  card.querySelectorAll(".step-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const mid=btn.dataset.mid, key=btn.dataset.key, dir=parseInt(btn.dataset.dir);
      setS(mid,key,getS(mid,key)+dir);
      updateDisplay(mid);
    });
  });
  // Parier
  const betBtn=card.querySelector("[data-betid]");
  if(betBtn) betBtn.addEventListener("click",()=>placeBet(m.id));

  return card;
}

async function placeBet(matchId){
  const s1=getS(matchId,"s1"), s2=getS(matchId,"s2");
  try {
    // Tout passe par la fonction serveur place_bet : c'est ELLE qui vérifie
    // l'heure réelle de la base de données, impossible à tromper en
    // changeant l'heure du téléphone.
    const res=await sbRpc("place_bet",{p_user_id:me.id,p_match_id:parseInt(matchId,10),p_score1:s1,p_score2:s2});
    if(res==="error:locked"){toast("Trop tard — verrouillé côté serveur !","err");loadMatches();return;}
    if(res==="error:not_found"){toast("Match introuvable","err");return;}
    toast("Pronostic enregistré !","ok");
    loadMatches();
  } catch(e){toast("Erreur enregistrement (vérifie que la fonction SQL place_bet est bien créée)","err");console.error(e);}
}

/* Recupere les etiquettes de plusieurs joueurs en une fois (non-bloquant) */
async function fetchLabelsMap(uids){
  if(!uids.length) return {};
  try {
    // 2 requetes simples au lieu d'une jointure PostgREST (plus robuste,
    // ne depend pas de la detection automatique de la relation par Supabase)
    const links=await sbGet("user_labels?user_id=in.("+uids.join(",")+")&select=user_id,label_id");
    if(!links.length) return {};
    const labelIds=[...new Set(links.map(l=>l.label_id))];
    const labels=await sbGet("labels?id=in.("+labelIds.join(",")+")&select=*");
    const byId={}; labels.forEach(l=>{ byId[l.id]=l; });
    const map={};
    links.forEach(l=>{
      if(!byId[l.label_id]) return;
      if(!map[l.user_id])map[l.user_id]=[];
      map[l.user_id].push(byId[l.label_id]);
    });
    return map;
  } catch(err){
    console.warn("Etiquettes non chargees (table labels/user_labels manquante ?) :",err);
    return {};
  }
}
function labelsHtml(labs){
  if(!labs||!labs.length) return "";
  return labs.map(l=>`<span class="lbadge" style="background:${l.color}22;color:${l.color};border:1px solid ${l.color}44">${l.emoji} ${esc(l.name)}</span>`).join("");
}

async function loadRanking(mode){
  const box=document.getElementById("rankList");
  box.innerHTML='<p class="loading">Chargement...</p>';
  try {
    let users;
    if(mode==="global"){
      users=await sbGet("users?select=id,pseudo,points&order=points.desc");
    } else {
      const fRows=await sbGet("friends?select=*&or=(user_id.eq."+me.id+",friend_id.eq."+me.id+")&status=eq.accepted");
      const ids=[...fRows.map(f=>f.user_id===me.id?f.friend_id:f.user_id),me.id];
      if(ids.length===1){ box.innerHTML='<p class="empty">Ajoute des amis pour ce classement.</p>'; return; }
      users=await sbGet("users?select=id,pseudo,points&id=in.("+ids.join(",")+")&order=points.desc");
    }
    if(!users.length){box.innerHTML='<p class="empty">Personne ici.</p>';return;}

    const labMap=await fetchLabelsMap(users.map(u=>u.id));

    box.innerHTML="";
    users.forEach((u,i)=>{
      const numCls=i===0?"rnum g1":i===1?"rnum g2":i===2?"rnum g3":"rnum";
      const labs=labelsHtml(labMap[u.id]);
      const row=document.createElement("div");
      row.className="rrow"+(u.id===me.id?" me":"");
      row.innerHTML=`<span class="${numCls}">${i+1}</span><div class="rinfo"><div class="rpseudo">${esc(u.pseudo)}</div>${labs?'<div class="rlabels">'+labs+'</div>':""}</div><span class="rpts">${u.points||0} pts</span>`;
      box.appendChild(row);
    });
  } catch(err){
    box.innerHTML='<p class="empty">Erreur : '+esc(String(err.message||err).slice(0,140))+'</p>';
    console.error("RANKING ERROR:",err);
  }
}

async function searchFriends(){

  try {
    const users=await sbGet("users?pseudo=ilike.*"+encodeURIComponent(term)+"*&select=id,pseudo&limit=8");

  await loadAssignSelects();
}

document.getElementById("importBtn").addEventListener("click",importCalendar);
document.getElementById("syncBtn").addEventListener("click",syncScores);

async function importCalendar(){
  if(!confirm("Importer les 104 matchs officiels ?")) return;
  toast("Import en cours...","ok");
  try {
    const r=await fetch("https://www.thestatsapi.com/world-cup/data/fixtures.json");
    if(!r.ok) throw new Error("fetch "+r.status);
    const data=await r.json();
    const ex=await sbGet("matches?select=team1,team2,match_date");
    const exKeys=new Set(ex.map(m=>m.team1+"|"+m.team2+"|"+new Date(m.match_date).toISOString()));
    const ins=[];
    data.fixtures.forEach(f=>{
      const t1=trTeam(f.homeTeam), t2=trTeam(f.awayTeam);
      const dt=new Date(f.kickoffUtc).toISOString();
      if(exKeys.has(t1+"|"+t2+"|"+dt)) return;
      ins.push({team1:t1,team2:t2,flag1:flag(t1),flag2:flag(t2),group_name:f.group||stageLabel(f.stage),match_date:dt,status:"scheduled"});
    });
    if(!ins.length){toast("Déjà à jour !","ok");return;}
    await sbPost("matches",ins);
    toast(ins.length+" matchs importés !","ok");
    renderAdminMatches();
  } catch(e){toast("Erreur import (vérif connexion)","err");console.error(e);}
}

/* Sync automatique scores via TheSportsDB (gratuit, sans clé) */
async function syncScores(){
  toast("Synchro des scores...","ok");
  try {
    // Récupère les matchs non terminés
    const pending=await sbGet("matches?status=neq.finished&select=*");
    if(!pending.length){toast("Aucun match à syncer","ok");return;}

    let synced=0;
    // Pour chaque match passé, on cherche le score
    for(const m of pending){
      const mTime=new Date(m.match_date).getTime();
      if(now()<mTime+90*60*1000) continue; // pas encore terminé (+90min)
      // Date du match
      const d=new Date(m.match_date);
      const dateStr=d.toISOString().split("T")[0];
      const r=await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${dateStr}&s=Soccer`);
      if(!r.ok) continue;
      const data=await r.json();
      if(!data.events) continue;
      // Chercher le match par noms d'équipes (en utilisant TRANSLATE inversé)
      const e=data.events.find(ev=>{
        const ht=(TRANSLATE[ev.strHomeTeam]||ev.strHomeTeam||"").toLowerCase();
        const at=(TRANSLATE[ev.strAwayTeam]||ev.strAwayTeam||"").toLowerCase();
        const t1=m.team1.toLowerCase(), t2=m.team2.toLowerCase();
        return (ht===t1&&at===t2)||(ht===t2&&at===t1);
      });
      if(!e||!e.intHomeScore||!e.intAwayScore) continue;
      let s1=parseInt(e.intHomeScore), s2=parseInt(e.intAwayScore);
      // Inverser si équipes dans l'ordre inverse
      const ht=(TRANSLATE[e.strHomeTeam]||e.strHomeTeam||"").toLowerCase();
      if(ht===m.team2.toLowerCase()){ [s1,s2]=[s2,s1]; }
      await doFinishMatch(m.id,s1,s2);
      synced++;
    }
    toast(synced>0?synced+" match(s) mis à jour !":"Aucun nouveau score disponible","ok");
    renderAdminMatches();
  } catch(e){toast("Erreur synchro","err");console.error(e);}
}

async function renderAdminMatches(){
  const box=document.getElementById("adminList");
  box.innerHTML='<p class="loading">Chargement...</p>';
  try {
    const matches=await sbGet("matches?select=*&order=match_date.asc");
    if(!matches.length){box.innerHTML='<p class="empty">Aucun match.</p>';return;}
    box.innerHTML="";
    matches.forEach(m=>{
      const f1=m.flag1||flag(m.team1), f2=m.flag2||flag(m.team2);
      const row=document.createElement("div");
      row.className="amrow";
      if(m.status==="finished"){
        row.innerHTML=`<div class="aminfo">${f1} ${esc(m.team1)} <strong>${m.score1}–${m.score2}</strong> ${esc(m.team2)} ${f2}</div><span class="stag-small">✅ Terminé</span>`;
      } else {
        row.innerHTML=`
          <div class="aminfo">${f1} ${esc(m.team1)} vs ${esc(m.team2)} ${f2}<br><span style="font-size:10.5px;color:var(--dim)">${fmtDate(m.match_date)}</span></div>
          <div class="amscore">
            <input type="number" min="0" max="20" id="as1-${m.id}" placeholder="0">
            –
            <input type="number" min="0" max="20" id="as2-${m.id}" placeholder="0">
            <button class="sbtn-small" data-fin="${m.id}">✔</button>
            <button class="sbtn-small" data-edit="${m.id}" data-t1="${esc(m.team1)}" data-t2="${esc(m.team2)}">✏️</button>
            <button class="sbtn-small danger" data-del="${m.id}">✕</button>
          </div>`;
      }
      box.appendChild(row);
    });
    box.querySelectorAll("[data-fin]").forEach(b=>b.addEventListener("click",()=>{
      const s1=parseInt(document.getElementById("as1-"+b.dataset.fin).value);
      const s2=parseInt(document.getElementById("as2-"+b.dataset.fin).value);
      if(isNaN(s1)||isNaN(s2)){toast("Entre les deux scores","err");return;}
      doFinishMatch(b.dataset.fin,s1,s2).then(()=>{toast("Résultat enregistré !","ok");renderAdminMatches();});
    }));
    box.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",async()=>{
      if(!confirm("Supprimer ?")) return;
      await sbDelete("matches?id=eq."+b.dataset.del); toast("Supprimé","ok"); renderAdminMatches();
    }));
    box.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",async()=>{
      const t1=prompt("Équipe 1 :",b.dataset.t1); if(t1===null)return;
      const t2=prompt("Équipe 2 :",b.dataset.t2); if(t2===null)return;
      await sbPatch("matches?id=eq."+b.dataset.edit,{team1:t1,team2:t2,flag1:flag(t1),flag2:flag(t2)});
      toast("Mis à jour","ok"); renderAdminMatches();
    }));
  } catch(e){box.innerHTML='<p class="empty">Erreur.</p>';console.error(e);}
}

document.getElementById("addMatchForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const t1=document.getElementById("mTeam1").value.trim();
  const t2=document.getElementById("mTeam2").value.trim();
  const g=document.getElementById("mGroup").value;
  const dt=document.getElementById("mDate").value;
  if(!t1||!t2||!dt){toast("Remplis tous les champs","err");return;}
  try {
    await sbPost("matches",[{team1:t1,team2:t2,flag1:flag(t1),flag2:flag(t2),group_name:g,match_date:new Date(dt).toISOString()}]);
    toast("Match ajouté !","ok"); e.target.reset(); renderAdminMatches();
  } catch(e){toast("Erreur","err");console.error(e);}
});

/* Calcul des points — via RPC serveur (anti-triche) */
async function doFinishMatch(matchId,score1,score2){
  try {
    // Appel RPC : le serveur vérifie is_admin et calcule les points
    const res=await sbRpc("finish_match",{p_match_id:parseInt(matchId),p_score1:score1,p_score2:score2,p_admin_id:me.id});
    if(res==="error:not_admin"){toast("Tu n'es pas admin !","err");return;}
    // Refresh points locaux
    const fresh=await sbGet("users?id=eq."+me.id+"&select=points");
    if(fresh.length){ me.points=fresh[0].points; save(me); document.getElementById("hdrPts").textContent=me.points+" pts"; }
  } catch(e){
    // Fallback si le RPC n'existe pas encore (pendant la migration)
    toast("RPC manquant — voir instructions SQL","err");
    console.error("RPC finish_match non trouvé. Exécute le SQL fourni dans Supabase.",e);
  }
}

   ================================================ */
async function renderLabels(){
  const box=document.getElementById("lblList");
  try {
    const labels=await sbGet("labels?select=*&order=created_at.asc");
    if(!labels.length){box.innerHTML='<p class="empty" style="margin-bottom:0">Aucune étiquette.</p>';return;}
    box.innerHTML="";
    labels.forEach(l=>{
      const row=document.createElement("div");
      row.className="lrow";
      row.innerHTML=`
        <div class="lrow-info">
          <span class="lbadge" style="background:${l.color}22;color:${l.color};border:1px solid ${l.color}44">${esc(l.emoji)} ${esc(l.name)}</span>
        </div>
        <div class="lrow-actions">
          <button class="sbtn-small danger" data-dellbl="${l.id}">✕</button>
        </div>`;
      box.appendChild(row);
    });
    box.querySelectorAll("[data-dellbl]").forEach(b=>b.addEventListener("click",async()=>{
      await sbDelete("labels?id=eq."+b.dataset.dellbl);
      toast("Étiquette supprimée","ok"); loadAdmin();
    }));
  } catch(err){
    box.innerHTML='<p class="empty">Erreur : '+esc(String(err.message||err).slice(0,140))+'</p>';
    console.error("LABELS LIST ERROR:",err);
  }
}

document.getElementById("lblCreateBtn").addEventListener("click",async()=>{
  const emoji=document.getElementById("lblEmoji").value.trim()||"🏷️";
  const name=document.getElementById("lblName").value.trim();
  const color=document.getElementById("lblColor").value;

    await sbPost("labels",[{emoji,name,color}]);

    loadAdmin();
  } catch(err){
    toast("Erreur : "+String(err.message||err).slice(0,140),"err");

  }

async function loadAssignSelects(){
  try {
    const [users,labels]=await Promise.all([
      sbGet("users?select=id,pseudo&order=pseudo.asc"),
      sbGet("labels?select=*&order=name.asc")
    ]);
    document.getElementById("assignUser").innerHTML=users.map(u=>`<option value="${u.id}">${esc(u.pseudo)}</option>`).join("");
    document.getElementById("assignLabel").innerHTML=labels.map(l=>`<option value="${l.id}">${esc(l.emoji)} ${esc(l.name)}</option>`).join("");
  } catch(err){ console.error("ASSIGN SELECTS ERROR:",err); }
}

document.getElementById("assignBtn").addEventListener("click",async()=>{
  const uid=document.getElementById("assignUser").value;
  const lid=document.getElementById("assignLabel").value;
  if(!uid||!lid){toast("Sélectionne un joueur et une étiquette","err");return;}
  try {
    await sbPost("user_labels?on_conflict=user_id,label_id",[{user_id:uid,label_id:lid}],{"Prefer":"resolution=ignore,return=representation"});
    toast("Étiquette assignée !","ok");
  } catch(e){toast("Erreur ou déjà assignée","err");console.error(e);}
});

   DÉMARRAGE
   ================================================ */
window.addEventListener("DOMContentLoaded",async()=>{
  initStatics();
  const sess=load();
  if(sess){
    me=sess;
    try {
      const fresh=await sbGet("users?id=eq."+sess.id+"&select=*");
      if(fresh.length) me={id:fresh[0].id,pseudo:fresh[0].pseudo,is_admin:fresh[0].is_admin,points:fresh[0].points};
      save(me); showApp();
    } catch(e){ showApp(); }
  } else { showAuth(); }
});
</script>
